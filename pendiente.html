<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cuenta pendiente — santzez</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="cabecera">
  <div class="contenedor">
    <a class="cabecera__marca" href="/index.html">
      <img src="/assets/logo.svg" alt="" style="height:44px" />
      <span>
        <span class="cabecera__titulo">santzez</span>
        <span class="cabecera__subtitulo">the webpage</span>
      </span>
    </a>
    <div class="cabecera__usuario" id="usuario-cabecera"></div>
  </div>
</header>

<main>
  <div class="login-wrap">
    <h1>Cuenta pendiente</h1>
    <div class="feedback visible" style="margin-top:0;background:var(--color-primario-suave);border-color:var(--color-primario)">
      <div class="feedback__titulo" style="color:var(--color-primario)">En espera de aprobación</div>
      <p style="margin:0.6rem 0 0">
        Tu registro está completo, pero el administrador todavía no ha aprobado tu acceso. Recibirás un correo cuando esté activo. Si llevas mucho tiempo esperando, escribe a
        <a href="mailto:santzez@gmail.com">santzez@gmail.com</a>.
      </p>
    </div>

    <p style="text-align:center;font-size:0.9rem;margin-top:1.5rem;margin-bottom:0">
      <button type="button" class="btn btn--secundario" id="btn-salir">Cerrar sesión</button>
    </p>
  </div>
</main>

<footer class="pie">
  <div class="contenedor">
    <p style="margin:0">© santzez</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script>
  (async function () {
    const sesion = await AuthSession.getSesion();
    if (!sesion) { location.href = '/login.html'; return; }

    const aprobado = await AuthSession.aprobado();
    if (aprobado) { location.href = '/index.html'; return; }

    document.getElementById('btn-salir').addEventListener('click', () => AuthSession.logout());
  })();
</script>
</body>
</html>
