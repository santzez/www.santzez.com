<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso — santzez</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="cabecera">
  <div class="contenedor">
    <a class="cabecera__marca" href="/index.html">
      <img src="/assets/logo.svg" alt="" style="height:44px" />
      <span>
        <span class="cabecera__titulo">santzez</span>
        <span class="cabecera__subtitulo">the webpage</span>
      </span>
    </a>
  </div>
</header>

<main>
  <div class="login-wrap">
    <h1>Identifícate</h1>
    <div class="mensaje-error" id="error-msg"></div>
    <form id="formulario-login" autocomplete="on">
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required />
      </div>
      <div class="campo">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" style="width:100%">Entrar</button>
    </form>
    <p style="text-align:center;font-size:0.9rem;margin-top:1.5rem;margin-bottom:0.4rem">
      <a href="/recuperar.html">¿Has olvidado la contraseña?</a>
    </p>
    <p style="text-align:center;font-size:0.9rem;margin-top:0.4rem;margin-bottom:0">
      ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
    </p>
  </div>
</main>

<footer class="pie">
  <div class="contenedor">
    <p style="margin:0">© santzez — Acceso restringido</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script>
  (async function () {
    const params = new URLSearchParams(location.search);
    let destino = params.get('destino') || '/index.html';
    if (!destino.startsWith('/') || destino.startsWith('//')) destino = '/index.html';

    try {
      const sesion = await AuthSession.getSesion();
      if (sesion) {
        const aprobado = await AuthSession.aprobado();
        location.href = aprobado ? destino : '/pendiente.html';
        return;
      }
    } catch {}

    const form = document.getElementById('formulario-login');
    const err = document.getElementById('error-msg');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      err.classList.remove('visible');
      const email = document.getElementById('email').value.trim();
      const contrasena = document.getElementById('contrasena').value;
      const res = await AuthSession.iniciarSesion(email, contrasena);
      if (!res.ok) {
        err.textContent = res.error;
        err.classList.add('visible');
        return;
      }
      const aprobado = await AuthSession.aprobado();
      location.href = aprobado ? destino : '/pendiente.html';
    });
  })();
</script>
</body>
</html>
