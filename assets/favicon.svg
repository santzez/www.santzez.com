<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-label="santzez">
  <!-- Fondo azul corporativo (igual que la cabecera) -->
  <rect width="32" height="32" fill="#003da5"/>
  <!-- Cara lateral (negra) -->
  <polygon points="15,5 26,14 26,18 15,9" fill="#2d2926"/>
  <!-- Cara frontal (azul oscuro para contrastar con el fondo) -->
  <polygon points="26,14 18,18 18,22 26,18" fill="#001f56"/>
  <!-- Cara superior (blanca) -->
  <polygon points="6,9 15,5 26,14 18,18" fill="#ffffff"/>
  <!-- Z sobre la cara superior, proyectada en perspectiva isometrica -->
  <g transform="matrix(0.769 0.641 -0.641 0.769 12.2 11)" fill="#2d2926" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="7">
    <text x="0" y="0">Z</text>
  </g>
</svg>
