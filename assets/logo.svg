<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="santzez">
  <!-- Sombra bajo la goma -->
  <ellipse cx="36" cy="46" rx="22" ry="2.8" fill="#000000" opacity="0.16"/>

  <!-- Cara lateral larga (negro corporativo) -->
  <polygon points="30,6 54,26 54,34 30,14" fill="#2d2926"/>

  <!-- Cara frontal corta (azul corporativo) -->
  <polygon points="54,26 34,34 34,42 54,34" fill="#003da5"/>

  <!-- Cara superior (blanca, contorno azul para visibilidad sobre fondos claros) -->
  <polygon points="10,14 30,6 54,26 34,34" fill="#ffffff" stroke="#003da5" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Simbolos ⌘Z proyectados sobre la cara superior -->
  <g transform="matrix(0.769 0.641 -0.641 0.769 19 18)" fill="#2d2926" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="11">
    <text x="0" y="0">⌘Z</text>
  </g>

  <!-- Restos de borrado en la esquina inferior izquierda -->
  <g>
    <circle cx="6" cy="52" r="1.0" fill="#003da5"/>
    <circle cx="3" cy="56" r="0.7" fill="#2d2926" opacity="0.65"/>
    <circle cx="10" cy="55" r="0.9" fill="#003da5"/>
    <circle cx="14" cy="58" r="0.6" fill="#2d2926" opacity="0.55"/>
    <circle cx="6" cy="60" r="0.7" fill="#2d2926" opacity="0.5"/>
    <circle cx="12" cy="61" r="0.5" fill="#003da5" opacity="0.85"/>
  </g>
</svg>
