<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oposizioak — santzez</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="cabecera">
  <div class="contenedor">
    <a class="cabecera__marca" href="/index.html">
      <img src="/assets/logo.svg" alt="" style="height:44px" />
      <span>
        <span class="cabecera__titulo">santzez</span>
        <span class="cabecera__subtitulo">the webpage</span>
      </span>
    </a>
    <nav class="cabecera__nav">
      <a href="/index.html">Inicio</a>
      <a href="/oposizioak/index.html">Oposizioak</a>
    </nav>
    <div class="cabecera__usuario" id="usuario-cabecera"></div>
  </div>
</header>

<main>
  <div class="contenedor">
    <nav class="migas">
      <a href="/index.html">Inicio</a> <span>›</span> <span>Oposizioak</span>
    </nav>

    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem">
      <div>
        <h1 style="margin-bottom:0.4rem">Oposizioak</h1>
        <p style="margin:0">Elige la oposición que quieras preparar.</p>
      </div>
      <a class="btn btn--secundario" href="/oposizioak/estadisticas.html">Mis estadísticas</a>
    </div>

    <div class="grid" id="lista-opes" style="margin-top:1.5rem">
      <div class="tarjeta" style="opacity:0.6">Cargando oposiciones…</div>
    </div>
  </div>
</main>

<footer class="pie">
  <div class="contenedor">
    <p style="margin:0">© santzez</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/storage.js"></script>
<script>
  (async function () {
    const sesion = await AuthSession.exigirLogin();
    if (!sesion) return;

    try {
      const resp = await fetch('data/opes.json', { cache: 'no-store' });
      const datos = await resp.json();
      const cont = document.getElementById('lista-opes');
      cont.innerHTML = '';
      (datos.opes || []).forEach(ope => {
        const a = document.createElement('a');
        a.className = 'tarjeta';
        a.href = `ope.html?ope=${encodeURIComponent(ope.id)}`;
        a.innerHTML = `
          <div class="tarjeta__titulo">${ope.id}</div>
          <p class="tarjeta__descripcion">${ope.nombre || ''}</p>
          <div class="tarjeta__meta">
            <span>${ope.temas} tema${ope.temas === 1 ? '' : 's'}</span>
          </div>`;
        cont.appendChild(a);
      });
      if (!datos.opes || datos.opes.length === 0) {
        cont.innerHTML = '<div class="tarjeta">No hay oposiciones cargadas todavía.</div>';
      }
    } catch (err) {
      document.getElementById('lista-opes').innerHTML =
        `<div class="tarjeta">Error cargando el listado: ${err.message}</div>`;
    }
  })();
</script>
</body>
</html>
