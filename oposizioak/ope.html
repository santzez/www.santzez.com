<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oposición — santzez</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="cabecera">
  <div class="contenedor">
    <a class="cabecera__marca" href="/index.html">
      <img src="/assets/logo.svg" alt="" style="height:44px" />
      <span>
        <span class="cabecera__titulo">santzez</span>
        <span class="cabecera__subtitulo">the webpage</span>
      </span>
    </a>
    <nav class="cabecera__nav">
      <a href="/index.html">Inicio</a>
      <a href="/oposizioak/index.html">Oposizioak</a>
    </nav>
    <div class="cabecera__usuario" id="usuario-cabecera"></div>
  </div>
</header>

<main>
  <div class="contenedor">
    <nav class="migas">
      <a href="/index.html">Inicio</a> <span>›</span>
      <a href="/oposizioak/index.html">Oposizioak</a> <span>›</span>
      <span id="migas-ope">…</span>
    </nav>

    <h1 id="ope-titulo">Oposición</h1>
    <p id="ope-descripcion"></p>

    <h2 style="margin-top:2rem">Temas</h2>
    <div class="lista-temas" id="lista-temas">
      <div class="tarjeta" style="opacity:0.6">Cargando temas…</div>
    </div>
  </div>
</main>

<footer class="pie">
  <div class="contenedor">
    <p style="margin:0">© santzez</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/storage.js"></script>
<script>
  (async function () {
    const sesion = await AuthSession.exigirLogin();
    if (!sesion) return;

    const params = new URLSearchParams(location.search);
    const opeId = params.get('ope');
    if (!opeId) { location.href = '/oposizioak/index.html'; return; }

    document.getElementById('migas-ope').textContent = opeId;
    document.title = `${opeId} — santzez`;

    try {
      const resp = await fetch(`data/${opeId}/info.json`, { cache: 'no-store' });
      if (!resp.ok) throw new Error('No se pudo cargar la información de la oposición');
      const info = await resp.json();

      document.getElementById('ope-titulo').textContent = info.nombre || opeId;
      document.getElementById('ope-descripcion').textContent = info.descripcion || '';

      const cont = document.getElementById('lista-temas');
      cont.innerHTML = '';

      for (const tema of info.temas || []) {
        let preguntas = [];
        try {
          const r = await fetch(`data/${opeId}/${tema.id}.json`, { cache: 'no-store' });
          if (r.ok) {
            const d = await r.json();
            preguntas = d.preguntas || [];
          }
        } catch {}
        const numPreguntas = preguntas.length;

        // Cuenta cuántas preguntas tiene falladas el usuario en este tema
        let numFalladas = 0;
        if (numPreguntas > 0) {
          try {
            const falladas = await Storage.preguntasFalladas(sesion.user.id, preguntas);
            numFalladas = falladas.length;
          } catch (e) { console.warn('No se pudieron leer las falladas:', e); }
        }

        const urlTema = `quiz.html?ope=${encodeURIComponent(opeId)}&tema=${encodeURIComponent(tema.id)}`;
        const urlFalladas = urlTema + '&modo=falladas';

        const div = document.createElement('div');
        div.className = 'tarjeta tarjeta--clicable tarjeta--fila';
        div.dataset.href = urlTema;
        div.innerHTML = `
          <div class="tarjeta__principal">
            <div class="tarjeta__titulo">${tema.id}</div>
            <p class="tarjeta__descripcion">${tema.titulo || ''}</p>
          </div>
          <div class="tarjeta__estado">
            <span>${numPreguntas > 0 ? numPreguntas + ' preguntas' : 'Disponible'}</span>
            ${numFalladas > 0
              ? `<span class="tarjeta__badge tarjeta__badge--error">${numFalladas} fallada${numFalladas === 1 ? '' : 's'}</span>`
              : ''}
          </div>
          <div class="tarjeta__cta">
            ${numFalladas > 0
              ? `<a class="btn btn--secundario" href="${urlFalladas}">Repasar fallos</a>`
              : ''}
            <span class="tarjeta__flecha" aria-hidden="true">→</span>
          </div>
        `;

        // Click en la tarjeta entera → empezar el tema completo
        div.addEventListener('click', () => { location.href = div.dataset.href; });
        // Click en el botón secundario → no propaga al div
        div.querySelectorAll('a').forEach(a =>
          a.addEventListener('click', e => e.stopPropagation())
        );

        cont.appendChild(div);
      }

      if (!info.temas || info.temas.length === 0) {
        cont.innerHTML = '<div class="tarjeta">No hay temas cargados todavía.</div>';
      }
    } catch (err) {
      document.getElementById('lista-temas').innerHTML =
        `<div class="tarjeta">Error: ${err.message}</div>`;
    }
  })();
</script>
</body>
</html>
