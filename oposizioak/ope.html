<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oposición — santzez</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="cabecera">
  <div class="contenedor">
    <a class="cabecera__marca" href="/index.html">
      <img src="/assets/logo.svg" alt="" style="height:44px" />
      <span>
        <span class="cabecera__titulo">santzez</span>
        <span class="cabecera__subtitulo">the webpage</span>
      </span>
    </a>
    <nav class="cabecera__nav">
      <a href="/index.html">Inicio</a>
      <a href="/oposizioak/index.html">Oposizioak</a>
    </nav>
    <div class="cabecera__usuario" id="usuario-cabecera"></div>
  </div>
</header>

<main>
  <div class="contenedor">
    <nav class="migas" id="migas-navegacion">
      <a href="/index.html">Inicio</a> <span>›</span>
      <a href="/oposizioak/index.html">Oposizioak</a>
    </nav>

    <h1 id="ope-titulo">Oposición</h1>
    <p id="ope-descripcion" style="white-space:pre-line"></p>
    <details id="ope-info-ampliada" class="info-ampliada" hidden>
      <summary>INFO</summary>
      <div class="info-ampliada__contenido" id="ope-info-ampliada-contenido"></div>
    </details>

    <h2 id="ope-subtitulo" style="margin-top:2rem">Contenido</h2>
    <div class="lista-temas" id="lista-contenido">
      <div class="skeleton-tarjeta">
        <div class="skeleton-linea skeleton-linea--titulo"></div>
        <div class="skeleton-linea skeleton-linea--larga"></div>
        <div class="skeleton-linea skeleton-linea--corta"></div>
      </div>
      <div class="skeleton-tarjeta">
        <div class="skeleton-linea skeleton-linea--titulo"></div>
        <div class="skeleton-linea skeleton-linea--larga"></div>
        <div class="skeleton-linea skeleton-linea--corta"></div>
      </div>
      <div class="skeleton-tarjeta">
        <div class="skeleton-linea skeleton-linea--titulo"></div>
        <div class="skeleton-linea skeleton-linea--larga"></div>
        <div class="skeleton-linea skeleton-linea--corta"></div>
      </div>
    </div>
  </div>
</main>

<footer class="pie">
  <div class="contenedor">
    <p style="margin:0">© santzez</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/preferencias.js"></script>
<script src="/js/view-transitions.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/storage.js"></script>
<script>
  /* -------------------------------------------------------------
     ope.html — navegación jerárquica de una oposición.
     Lee ?ope=<ruta> donde <ruta> puede ser una jerarquía separada
     por "/" (ej: OPE_DONOSTIA_2026_2027/Temario_General_C1).
     Renderiza según info.tipo:
       - "grupo" → tarjetas de sub-navegación (hijos)
       - "temas" → tarjetas de temas para lanzar el quiz
       - "vacio" → mensaje "próximamente"
     ------------------------------------------------------------- */
  (async function () {
    const sesion = await AuthSession.exigirLogin();
    if (!sesion) return;

    const params = new URLSearchParams(location.search);
    const rutaOpe = params.get('ope');
    if (!rutaOpe) { location.href = '/oposizioak/index.html'; return; }

    // Construir migas de pan a partir de la ruta jerárquica.
    // Mostramos texto sin guiones bajos, pero la URL/href se mantiene con el ID técnico.
    const formatear = id => id.replace(/_/g, ' ');
    const partes = rutaOpe.split('/').filter(Boolean);
    const migas = document.getElementById('migas-navegacion');
    let acumulada = '';
    for (let i = 0; i < partes.length; i++) {
      acumulada += (i === 0 ? '' : '/') + partes[i];
      const esUltima = i === partes.length - 1;
      migas.insertAdjacentHTML('beforeend', ' <span>›</span> ');
      if (esUltima) {
        const span = document.createElement('span');
        span.textContent = formatear(partes[i]);
        migas.appendChild(span);
      } else {
        const a = document.createElement('a');
        a.href = `ope.html?ope=${encodeURIComponent(acumulada)}`;
        a.textContent = formatear(partes[i]);
        migas.appendChild(a);
      }
    }

    document.title = `${formatear(partes[partes.length - 1])} — santzez`;

    try {
      const resp = await fetch(`data/${rutaOpe}/info.json`, { cache: 'no-store' });
      if (resp.status === 404) {
        // Este tema/sección aún no tiene contenido publicado
        document.getElementById('ope-titulo').textContent = formatear(partes[partes.length - 1]);
        document.getElementById('ope-descripcion').textContent = '';
        document.getElementById('ope-subtitulo').textContent = 'Contenido';
        document.getElementById('lista-contenido').innerHTML = `
          <div class="tarjeta" style="text-align:center;padding:2.5rem">
            <div style="font-size:1.5rem;margin-bottom:0.75rem">🚧</div>
            <p style="margin:0 0 0.5rem;font-weight:600;color:var(--color-primario)">
              Este apartado todavía no tiene material publicado.
            </p>
            <p style="margin:0;color:var(--color-texto-suave);font-size:0.9rem">
              Se irá subiendo poco a poco. Vuelve pronto o revisa otros temas.
            </p>
          </div>`;
        return;
      }
      if (!resp.ok) throw new Error('No se pudo cargar la información');
      const info = await resp.json();

      document.getElementById('ope-titulo').textContent = info.nombre || rutaOpe;
      document.getElementById('ope-descripcion').textContent = info.descripcion || '';

      // Panel desplegable "+ INFO" con contenido HTML controlado desde el JSON
      const detalles = document.getElementById('ope-info-ampliada');
      if (info.infoAmpliada && String(info.infoAmpliada).trim().length > 0) {
        document.getElementById('ope-info-ampliada-contenido').innerHTML = info.infoAmpliada;
        detalles.hidden = false;
      }

      const cont = document.getElementById('lista-contenido');
      const subtitulo = document.getElementById('ope-subtitulo');
      cont.innerHTML = '';

      // Tipo "contenido" → fragmento HTML con material de estudio + botón imprimir
      if (info.tipo === 'contenido' && info.html) {
        subtitulo.hidden = true;
        try {
          const r = await fetch(`data/${rutaOpe}/${info.html}`, { cache: 'no-store' });
          if (!r.ok) throw new Error('No se pudo cargar el contenido');
          const htmlFragmento = await r.text();
          cont.classList.add('tema-contenedor');
          cont.innerHTML = `
            <div class="tema-acciones no-print">
              <button type="button" class="btn btn--secundario" onclick="window.print()">
                🖨 Imprimir / Guardar PDF
              </button>
              <button type="button" class="btn btn--secundario" onclick="window.scrollTo({top:0,behavior:'smooth'})">
                ↑ Volver arriba
              </button>
            </div>
            ${htmlFragmento}
          `;
          // Oculta el título/descripción de arriba (los reemplaza la cabecera del tema)
          document.getElementById('ope-titulo').hidden = true;
          document.getElementById('ope-descripcion').hidden = true;
        } catch (e) {
          cont.innerHTML = `<div class="tarjeta">Error cargando el contenido: ${e.message}</div>`;
        }
        return;
      }

      // Tipo "bloques" → acordeón: bloques colapsables con temas dentro
      if (info.tipo === 'bloques' && Array.isArray(info.bloques)) {
        subtitulo.textContent = 'Temario por bloques';
        info.bloques.forEach((bloque, iB) => {
          const details = document.createElement('details');
          details.className = 'bloque tarjeta--aparecer';
          details.style.animationDelay = (iB * 80) + 'ms';
          const nTemas = bloque.temas?.length || 0;
          details.innerHTML = `
            <summary class="bloque__summary">
              <div class="bloque__titulo">${bloque.titulo || bloque.id}</div>
              <div class="bloque__meta">
                <span class="bloque__contador">${nTemas} tema${nTemas === 1 ? '' : 's'}</span>
                <span class="bloque__chevron" aria-hidden="true">▸</span>
              </div>
            </summary>
            <div class="bloque__contenido">
              ${bloque.descripcion ? `<p class="bloque__descripcion">${bloque.descripcion}</p>` : ''}
              <div class="bloque__temas"></div>
            </div>
          `;
          const temasCont = details.querySelector('.bloque__temas');
          (bloque.temas || []).forEach((tema, iT) => {
            const rutaTema = `${rutaOpe}/${tema.id}`;
            const a = document.createElement('a');
            a.className = 'bloque-tema tarjeta--aparecer';
            a.style.animationDelay = (iT * 40) + 'ms';
            a.href = `ope.html?ope=${encodeURIComponent(rutaTema)}`;
            a.innerHTML = `
              <span class="bloque-tema__id">${tema.id}</span>
              <span class="bloque-tema__titulo">${tema.titulo || tema.id}</span>
              <span class="bloque-tema__flecha" aria-hidden="true">›</span>
            `;
            temasCont.appendChild(a);
          });
          cont.appendChild(details);
        });
        if (info.bloques.length === 0) {
          cont.innerHTML = '<div class="tarjeta">No hay bloques definidos todavía.</div>';
        }
        return;
      }

      // Tipo "material" → PDFs por tema en Supabase Storage
      if (info.tipo === 'material') {
        await renderMaterial(info, rutaOpe);
        return;
      }

      // Tipo "podcasts" → lista de reproductores HTML5
      if (info.tipo === 'podcasts') {
        subtitulo.textContent = 'Podcasts';
        cont.classList.add('lista-podcasts');
        const podcasts = info.podcasts || [];
        const base = info.urlBase || '';
        if (podcasts.length === 0) {
          cont.innerHTML = '<div class="tarjeta">Todavía no hay podcasts publicados.</div>';
          return;
        }
        // Formateador mm:ss
        const mmss = s => {
          if (!s || isNaN(s)) return '';
          const m = Math.floor(s / 60);
          const ss = Math.floor(s % 60).toString().padStart(2, '0');
          return `${m}:${ss}`;
        };
        podcasts.forEach((pod, i) => {
          const url = base + pod.archivo;
          const div = document.createElement('div');
          div.className = 'tarjeta tarjeta--podcast tarjeta--aparecer';
          div.style.animationDelay = (i * 60) + 'ms';
          div.innerHTML = `
            <div class="podcast__cabecera">
              <div>
                <div class="tarjeta__titulo">
                  ${pod.tema ? `<span class="podcast__tema">${pod.tema}</span> ` : ''}${pod.titulo || pod.archivo}
                </div>
                ${pod.descripcion ? `<p class="tarjeta__descripcion">${pod.descripcion}</p>` : ''}
              </div>
              <span class="podcast__duracion" data-duracion>${pod.duracion ? mmss(pod.duracion) : ''}</span>
            </div>
            <div class="podcast__linea">
              <audio class="podcast__audio" controls preload="metadata" src="${url}"></audio>
              <a class="podcast__descarga btn btn--secundario" href="${url}" download="${pod.archivo}" title="Descargar el archivo m4a">↓ Descargar</a>
            </div>
          `;
          const audio = div.querySelector('audio');
          // Duración automática desde metadata (si no venía en el JSON)
          const badgeDuracion = div.querySelector('[data-duracion]');
          audio.addEventListener('loadedmetadata', () => {
            if (!badgeDuracion.textContent.trim() && audio.duration && !isNaN(audio.duration)) {
              badgeDuracion.textContent = mmss(audio.duration);
            }
          });
          audio.addEventListener('error', () => {
            badgeDuracion.textContent = '⚠';
            badgeDuracion.title = 'No se pudo cargar el audio (¿archivo subido a R2?)';
            badgeDuracion.style.color = 'var(--color-error)';
          });
          cont.appendChild(div);
        });
        return;
      }

      // Tipo "vacio" → mensaje "próximamente"
      if (info.tipo === 'vacio') {
        subtitulo.textContent = 'Contenido';
        cont.innerHTML = `
          <div class="tarjeta" style="text-align:center;padding:2rem">
            <div style="font-size:1.2rem;margin-bottom:0.5rem">⏳</div>
            <p style="margin:0;color:var(--color-texto-suave, #666)">
              ${info.mensaje || 'Contenido próximamente disponible.'}
            </p>
          </div>`;
        return;
      }

      // Tipo "grupo" → renderizar hijos como tarjetas navegables
      if (info.tipo === 'grupo' && Array.isArray(info.hijos)) {
        subtitulo.textContent = 'Selecciona una sección';
        info.hijos.forEach((hijo, i) => {
          const rutaHijo = `${rutaOpe}/${hijo.id}`;
          const a = document.createElement('a');
          a.className = 'tarjeta tarjeta--clicable tarjeta--aparecer';
          a.style.animationDelay = (i * 60) + 'ms';
          a.href = `ope.html?ope=${encodeURIComponent(rutaHijo)}`;
          a.innerHTML = `
            <div class="tarjeta__titulo">${hijo.nombre || hijo.id}</div>
            <p class="tarjeta__descripcion">${hijo.descripcion || ''}</p>`;
          cont.appendChild(a);
        });
        if (info.hijos.length === 0) {
          cont.innerHTML = '<div class="tarjeta">Sin contenido todavía.</div>';
        }
        return;
      }

      // Tipo "temas" (o info.temas presente) → listado de temas para el quiz
      if (info.tipo === 'temas' || Array.isArray(info.temas)) {
        subtitulo.textContent = 'Temas';
        let indiceTema = 0;
        for (const tema of info.temas || []) {
          let preguntas = [];
          try {
            const r = await fetch(`data/${rutaOpe}/${tema.id}.json`, { cache: 'no-store' });
            if (r.ok) {
              const d = await r.json();
              preguntas = d.preguntas || [];
            }
          } catch {}
          const numPreguntas = preguntas.length;

          let numFalladas = 0;
          if (numPreguntas > 0) {
            try {
              const falladas = await Storage.preguntasFalladas(sesion.user.id, preguntas);
              numFalladas = falladas.length;
            } catch (e) { console.warn('No se pudieron leer las falladas:', e); }
          }

          const urlTema = `quiz.html?ope=${encodeURIComponent(rutaOpe)}&tema=${encodeURIComponent(tema.id)}`;
          const urlFalladas = urlTema + '&modo=falladas';

          const div = document.createElement('div');
          div.className = 'tarjeta tarjeta--clicable tarjeta--fila tarjeta--aparecer';
          div.style.animationDelay = (indiceTema++ * 60) + 'ms';
          div.dataset.href = urlTema;
          div.innerHTML = `
            <div class="tarjeta__principal">
              <div class="tarjeta__titulo">${tema.id}</div>
              <p class="tarjeta__descripcion">${tema.titulo || ''}</p>
            </div>
            <div class="tarjeta__estado">
              <span>${numPreguntas > 0 ? numPreguntas + ' preguntas' : 'Disponible'}</span>
              ${numFalladas > 0
                ? `<span class="tarjeta__badge tarjeta__badge--error">${numFalladas} fallada${numFalladas === 1 ? '' : 's'}</span>`
                : ''}
            </div>
            <div class="tarjeta__cta">
              ${numFalladas > 0
                ? `<a class="btn btn--secundario" href="${urlFalladas}">Repasar fallos</a>`
                : ''}
            </div>
          `;
          div.addEventListener('click', () => { location.href = div.dataset.href; });
          div.querySelectorAll('a').forEach(a =>
            a.addEventListener('click', e => e.stopPropagation())
          );
          cont.appendChild(div);
        }
        if (!info.temas || info.temas.length === 0) {
          cont.innerHTML = '<div class="tarjeta">No hay temas cargados todavía.</div>';
        }
        return;
      }

      // Sin tipo reconocido
      cont.innerHTML = '<div class="tarjeta">Formato de contenido no reconocido.</div>';
    } catch (err) {
      document.getElementById('lista-contenido').innerHTML =
        `<div class="tarjeta">Error: ${err.message}</div>`;
    }

    // -------------------------------------------------------------
    // Renderizado tipo "material": PDFs por tema en Supabase Storage
    // -------------------------------------------------------------
    async function renderMaterial(info, rutaOpe) {
      const cont = document.getElementById('lista-contenido');
      const subtitulo = document.getElementById('ope-subtitulo');
      subtitulo.textContent = 'Material de estudio por tema';
      cont.innerHTML = '';

      const bucket = info.bucket || 'material';
      // El prefijo es la propia ruta jerárquica quitando el último nivel
      // (Material_de_estudio). Así los PDFs viven en:
      //   material/OPE_DONOSTIA_2026_2027/Temario_General_C1/T1/*.pdf
      const prefijoBase = rutaOpe.replace(/\/[^/]+$/, '');
      const cliente = AuthSession.cliente();

      // Detectar admin
      let esAdmin = false;
      try { esAdmin = await AuthSession.esAdmin(); } catch {}

      // Formateador de tamaño
      const kb = b => b < 1024*1024
        ? `${(b/1024).toFixed(1)} KB`
        : `${(b/1024/1024).toFixed(1)} MB`;

      // Función que refresca la lista de un tema
      async function cargarPDFsTema(temaId, listaNodo) {
        listaNodo.innerHTML = '<div class="skeleton-linea skeleton-linea--larga"></div><div class="skeleton-linea skeleton-linea--corta"></div>';
        const carpeta = `${prefijoBase}/${temaId}`;
        const { data, error } = await cliente.storage.from(bucket).list(carpeta, {
          limit: 100, sortBy: { column: 'name', order: 'asc' }
        });
        if (error) {
          listaNodo.innerHTML = `<p class="material__vacio">Error cargando la lista: ${error.message}</p>`;
          return;
        }
        const pdfs = (data || []).filter(x => x.name && x.name.toLowerCase().endsWith('.pdf'));
        if (pdfs.length === 0) {
          listaNodo.innerHTML = '<p class="material__vacio">Aún no hay PDFs en este tema.</p>';
          return;
        }
        listaNodo.innerHTML = '';
        for (const pdf of pdfs) {
          const rutaCompleta = `${carpeta}/${pdf.name}`;
          const { data: pub } = cliente.storage.from(bucket).getPublicUrl(rutaCompleta);
          const url = pub.publicUrl;
          const tam = pdf.metadata?.size ? kb(pdf.metadata.size) : '';
          const fila = document.createElement('div');
          fila.className = 'material-pdf';
          fila.innerHTML = `
            <div class="material-pdf__icono">📄</div>
            <div class="material-pdf__info">
              <div class="material-pdf__nombre">${pdf.name}</div>
              ${tam ? `<div class="material-pdf__meta">${tam}</div>` : ''}
            </div>
            <div class="material-pdf__acciones">
              <a class="btn btn--secundario" href="${url}" target="_blank" rel="noopener">Ver</a>
              <a class="btn btn--secundario" href="${url}" download="${pdf.name}">↓ Descargar</a>
              ${esAdmin ? `
                <button type="button" class="btn-icono material-pdf__btn" data-accion="renombrar" data-nombre="${pdf.name}" title="Renombrar">✎</button>
                <button type="button" class="btn-icono material-pdf__btn material-pdf__btn--peligro" data-accion="borrar" data-nombre="${pdf.name}" title="Borrar">🗑</button>
              ` : ''}
            </div>
          `;
          // Handlers admin
          if (esAdmin) {
            fila.querySelector('[data-accion="renombrar"]').addEventListener('click', async () => {
              const nuevo = prompt(`Nuevo nombre para "${pdf.name}"`, pdf.name);
              if (!nuevo || nuevo === pdf.name) return;
              const nombreFinal = nuevo.toLowerCase().endsWith('.pdf') ? nuevo : nuevo + '.pdf';
              const { error } = await cliente.storage.from(bucket).move(rutaCompleta, `${carpeta}/${nombreFinal}`);
              if (error) return alert(`Error renombrando: ${error.message}`);
              await cargarPDFsTema(temaId, listaNodo);
            });
            fila.querySelector('[data-accion="borrar"]').addEventListener('click', async () => {
              if (!confirm(`¿Borrar "${pdf.name}"? Esta acción no se puede deshacer.`)) return;
              const { error } = await cliente.storage.from(bucket).remove([rutaCompleta]);
              if (error) return alert(`Error borrando: ${error.message}`);
              await cargarPDFsTema(temaId, listaNodo);
            });
          }
          listaNodo.appendChild(fila);
        }
      }

      // Función que sube un archivo
      async function subirArchivo(file, temaId, listaNodo, barra) {
        if (!file) return;
        if (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
          alert('Solo se admiten archivos PDF.');
          return;
        }
        if (file.size > 50 * 1024 * 1024) {
          alert('El archivo supera el máximo de 50 MB.');
          return;
        }
        const rutaCompleta = `${prefijoBase}/${temaId}/${file.name}`;
        barra.classList.add('material__barra--visible');
        barra.textContent = `Subiendo ${file.name}…`;
        const { error } = await cliente.storage.from(bucket).upload(rutaCompleta, file, {
          cacheControl: '3600', upsert: true, contentType: 'application/pdf'
        });
        barra.classList.remove('material__barra--visible');
        if (error) return alert(`Error subiendo: ${error.message}`);
        await cargarPDFsTema(temaId, listaNodo);
      }

      // Render principal: una tarjeta por tema
      const temas = info.temas || [];
      if (temas.length === 0) {
        cont.innerHTML = '<div class="tarjeta">No hay temas definidos.</div>';
        return;
      }
      temas.forEach((tema, i) => {
        const div = document.createElement('div');
        div.className = 'tarjeta tarjeta--material tarjeta--aparecer';
        div.style.animationDelay = (i * 60) + 'ms';
        div.innerHTML = `
          <div class="material__cabecera">
            <div class="tarjeta__titulo"><span class="podcast__tema">${tema.id}</span> ${tema.titulo || tema.id}</div>
          </div>
          <div class="material__lista"></div>
          ${esAdmin ? `
            <div class="material__admin">
              <div class="material__barra"></div>
              <div class="material__dropzone" tabindex="0">
                <div class="material__dropzone-txt">
                  <strong>Arrastra PDFs aquí</strong> o pulsa para seleccionar
                </div>
                <input type="file" accept="application/pdf,.pdf" multiple hidden>
              </div>
            </div>
          ` : ''}
        `;
        const listaNodo = div.querySelector('.material__lista');
        cargarPDFsTema(tema.id, listaNodo);

        // Handlers admin: drag & drop + input file
        if (esAdmin) {
          const barra = div.querySelector('.material__barra');
          const zona = div.querySelector('.material__dropzone');
          const input = div.querySelector('input[type="file"]');

          zona.addEventListener('click', () => input.click());
          zona.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
          });
          input.addEventListener('change', async () => {
            for (const f of input.files) await subirArchivo(f, tema.id, listaNodo, barra);
            input.value = '';
          });
          ['dragenter','dragover'].forEach(ev =>
            zona.addEventListener(ev, e => { e.preventDefault(); zona.classList.add('material__dropzone--activa'); })
          );
          ['dragleave','drop'].forEach(ev =>
            zona.addEventListener(ev, e => { e.preventDefault(); zona.classList.remove('material__dropzone--activa'); })
          );
          zona.addEventListener('drop', async e => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            for (const f of files) await subirArchivo(f, tema.id, listaNodo, barra);
          });
        }
        cont.appendChild(div);
      });
    }
  })();
</script>
</body>
</html>
